  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #0b2545;
      --navy-dk: #071a33;
      --gold:    #eec915;
      --gold-dk: #d4b310;
      --text:    #1a1a2e;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --surface: #ffffff;
      --bg:      #f8fafc;
      --green:   #16a34a;
      --radius:  10px;
      --radius-lg: 16px;
      --transition: .2s ease;
    }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    .nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 80px; }
    .nav-inner img { height: 64px; width: auto; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-phone { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); text-decoration: none; }
    .nav-phone:hover { color: var(--gold-dk); }
    .lang-toggle { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .lang-btn { background: none; border: none; padding: 6px 12px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all .2s; letter-spacing: .05em; }
    .lang-btn.active { background: var(--navy); color: var(--gold); }

    /* GOLD BAR */
    .gold-bar { height: 4px; background: linear-gradient(90deg, var(--gold), #f5d84a, var(--gold)); }

    /* HERO */
    .hero { background: linear-gradient(135deg, var(--navy) 0%, #1a3a6b 100%); padding: 52px 24px 48px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 120%, rgba(238,201,21,.12) 0%, transparent 70%); }
    .hero-tag { display: inline-block; background: rgba(238,201,21,.15); border: 1px solid rgba(238,201,21,.3); color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; padding: 5px 16px; border-radius: 20px; margin-bottom: 18px; position: relative; }
    .hero h1 { font-family: 'Poppins', sans-serif; font-size: clamp(24px, 4vw, 36px); font-weight: 800; color: #fff; letter-spacing: -.5px; margin-bottom: 10px; position: relative; }
    .hero p { font-size: 15px; color: rgba(255,255,255,.7); max-width: 480px; margin: 0 auto; position: relative; }

    /* STEPS */
    .steps { display: flex; justify-content: center; gap: 0; max-width: 680px; margin: 32px auto 0; position: relative; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; position: relative; }
    .step:not(:last-child)::after { content: ''; position: absolute; top: 16px; left: 50%; width: 100%; height: 2px; background: rgba(255,255,255,.15); }
    .step.active:not(:last-child)::after { background: var(--gold); }
    .step-num { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.1); border: 2px solid rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,.5); position: relative; z-index: 1; transition: all .3s; }
    .step.active .step-num { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    .step.done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
    .step-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.4); letter-spacing: .04em; text-align: center; }
    .step.active .step-label { color: rgba(255,255,255,.9); }

    /* MAIN */
    .main { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 4px 32px rgba(0,0,0,.08); overflow: hidden; }
    .card-body { padding: 36px 36px; }

    /* STEP CONTENT */
    .step-title { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
    .step-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ADDRESS */
    .address-input-wrap { display: flex; gap: 12px; }
    .address-input { flex: 1; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'Open Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--bg); transition: border-color var(--transition), box-shadow var(--transition); width: 100%; }
    .address-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(238,201,21,.15); background: #fff; }
    .address-input::placeholder { color: #94a3b8; }
    .btn-primary { background: var(--navy); color: #fff; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700; padding: 14px 24px; border: none; border-radius: var(--radius); cursor: pointer; white-space: nowrap; transition: background var(--transition); }
    .btn-primary:hover { background: #0f2a4a; }
    .address-hint { font-size: 12px; color: var(--muted); margin-top: 10px; }

    /* MAP */
    .map-instructions { background: #fffbeb; border: 1px solid #fde68a; border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: #92400e; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
    .map-instructions svg { flex-shrink: 0; margin-top: 1px; }
    #map { width: 100%; height: 420px; border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; }
    .map-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .btn-gold { background: var(--gold); color: var(--navy); font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 800; padding: 12px 24px; border: none; border-radius: var(--radius); cursor: pointer; transition: background var(--transition); }
    .btn-gold:hover { background: var(--gold-dk); }
    .btn-outline { background: transparent; color: var(--muted); font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; padding: 12px 20px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color var(--transition), color var(--transition); }
    .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

    /* QUOTE */
    .quote-result { background: linear-gradient(135deg, var(--navy) 0%, #1a3a6b 100%); border-radius: var(--radius-lg); padding: 32px; text-align: center; margin-bottom: 24px; position: relative; overflow: hidden; }
    .quote-result::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 50% 120%, rgba(238,201,21,.15) 0%, transparent 70%); }
    .quote-label { font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 8px; position: relative; }
    .quote-amount { font-family: 'Poppins', sans-serif; font-size: clamp(32px, 6vw, 48px); font-weight: 800; color: var(--gold); letter-spacing: -1.5px; line-height: 1; position: relative; }
    .quote-range { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 6px; position: relative; }

    /* INSURANCE */
    .insurance-toggle { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer; margin-bottom: 24px; transition: border-color var(--transition), background var(--transition); }
    .insurance-toggle:hover { border-color: var(--green); }
    .insurance-toggle.active { background: #dcfce7; border-color: var(--green); }
    .toggle-checkbox { width: 20px; height: 20px; flex-shrink: 0; border: 2px solid #86efac; border-radius: 5px; background: #fff; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .2s; }
    .insurance-toggle.active .toggle-checkbox { background: var(--green); border-color: var(--green); }
    .toggle-checkbox svg { display: none; }
    .insurance-toggle.active .toggle-checkbox svg { display: block; }
    .toggle-text h4 { font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700; color: var(--green); margin-bottom: 3px; }
    .toggle-text p { font-size: 13px; color: #166534; line-height: 1.5; }
    .insurance-msg { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 24px; display: none; }
    .insurance-msg.show { display: block; }
    .insurance-msg p { font-size: 13px; color: #166534; line-height: 1.6; }
    .insurance-msg strong { color: var(--green); }

    /* FORM */
    .lead-form-title { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .lead-form-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
    .field input { padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'Open Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--bg); transition: border-color var(--transition), box-shadow var(--transition); }
    .field input::placeholder { color: #94a3b8; }
    .field input:focus { outline: none; border-color: var(--gold); background: #fff; box-shadow: 0 0 0 3px rgba(238,201,21,.15); }
    .btn-submit { width: 100%; margin-top: 16px; padding: 16px; background: var(--gold); color: var(--navy); font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 800; border: none; border-radius: var(--radius); cursor: pointer; box-shadow: 0 6px 20px rgba(238,201,21,.3); transition: background var(--transition), transform 80ms; }
    .btn-submit:hover { background: var(--gold-dk); }
    .btn-submit:active { transform: scale(.98); }
    .form-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }

    /* THANKS */
    #step-thanks { text-align: center; }
    .thanks-icon { width: 72px; height: 72px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .thanks-icon svg { width: 36px; height: 36px; stroke: var(--green); }
    .thanks-title { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 10px; }
    .thanks-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .thanks-call { display: inline-flex; align-items: center; gap: 10px; background: var(--navy); color: var(--gold); font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 800; padding: 14px 28px; border-radius: var(--radius); text-decoration: none; }

    /* FOOTER */
    .footer { background: var(--navy-dk, #071a33); padding: 24px; text-align: center; }
    .footer p { font-size: 12px; color: rgba(255,255,255,.35); }
    .footer a { color: var(--gold); text-decoration: none; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .card-body { padding: 24px 20px; }
      .address-input-wrap { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
      #map { height: 320px; }
      .nav-inner { padding: 0 16px; }
    }

/* Auto-detect language */

  const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();

/* ── CONFIG ── */
const PRICE_PER_SQUARE = 361;
const GHL_WEBHOOK = 'https://services.leadconnectorhq.com/hooks/ki3R8ONUGCoypSPmnblP/webhook-trigger/fd54be4b-88f8-41f3-830c-91ddfa5b433e';

/* ── STATE ── */
let map, geocoder, drawingManager, polygon;
let roofSquares = 0;
let insuranceClaim = false;

/* ── STEPS ── */
function showStep(n) {
  ['step-address','step-map','step-quote','step-thanks'].forEach((id, i) => {
    document.getElementById(id).style.display = (i === n - 1) ? 'block' : 'none';
  });
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('step-indicator-' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    if (i === n) el.classList.add('active');
  }
  document.querySelectorAll('.step.done .step-num').forEach(el => {
    el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  });
}

function goBack(n) { showStep(n); }

/* ── STEP 1 → 2 ── */
function loadMap() {
  const address = document.getElementById('address-input').value.trim();
  if (!address) { document.getElementById('address-input').focus(); return; }
  showStep(2);
  initMap(address);
}

function initMap(address) {
  geocoder = new google.maps.Geocoder();
  geocoder.geocode({ address: address }, function(results, status) {
    if (status !== 'OK' || !results[0]) {
      alert(T[currentLang]['addr-alert']);
      showStep(1);
      return;
    }
    const location = results[0].geometry.location;
    map = new google.maps.Map(document.getElementById('map'), {
      center: location, zoom: 20, mapTypeId: 'satellite', tilt: 0,
      mapTypeControl: false, streetViewControl: false, fullscreenControl: false, zoomControl: true,
    });
    drawingManager = new google.maps.drawing.DrawingManager({
      drawingMode: google.maps.drawing.OverlayType.POLYGON,
      drawingControl: false,
      polygonOptions: { fillColor: '#eec915', fillOpacity: 0.25, strokeColor: '#eec915', strokeWeight: 2.5, editable: true, draggable: false }
    });
    drawingManager.setMap(map);
    google.maps.event.addListener(drawingManager, 'polygoncomplete', function(p) {
      polygon = p;
      drawingManager.setDrawingMode(null);
    });
  });
}

function clearPolygon() {
  if (polygon) { polygon.setMap(null); polygon = null; }
  if (drawingManager) drawingManager.setDrawingMode(google.maps.drawing.OverlayType.POLYGON);
}

/* ── STEP 2 → 3 ── */
function calculateQuote() {
  if (!polygon) { alert(T[currentLang]['s2-alert']); return; }
  const areaSqMeters = google.maps.geometry.spherical.computeArea(polygon.getPath());
  const areaSqFt = areaSqMeters * 10.7639;
  const squares = areaSqFt / 100;
  roofSquares = squares;
  const basePrice = Math.round(squares * PRICE_PER_SQUARE);
  const lowPrice  = Math.round(basePrice * 0.95);
  const highPrice = Math.round(basePrice * 1.12);
  document.getElementById('quote-amount').textContent = '$' + lowPrice.toLocaleString() + ' – $' + highPrice.toLocaleString();
  document.getElementById('quote-range').textContent  = T[currentLang]['quote-range'];
  showStep(3);
}

/* ── INSURANCE ── */
function toggleInsurance() {
  insuranceClaim = !insuranceClaim;
  document.getElementById('insurance-toggle').classList.toggle('active', insuranceClaim);
  document.getElementById('insurance-msg').classList.toggle('show', insuranceClaim);
}

/* ── STEP 3 → 4 ── */
function submitLead() {
  const name  = document.getElementById('f-name').value.trim();
  const lname = document.getElementById('f-lname').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if (!name || !phone) { alert(T[currentLang]['form-alert']); return; }
  const address  = document.getElementById('address-input').value.trim();
  const basePrice = Math.round(roofSquares * PRICE_PER_SQUARE);
  const lowPrice  = Math.round(basePrice * 0.95);
  const highPrice = Math.round(basePrice * 1.12);
  const sqft      = Math.round(roofSquares * 100);
  const payload = {
    firstName:       name,
    lastName:        lname,
    phone:           phone,
    email:           email,
    address1:        address,
    property_address: address,
    roof_squares:    Math.round(roofSquares),
    roof_sqft:       sqft,
    quote_low:       lowPrice,
    quote_high:      highPrice,
    insurance_claim: insuranceClaim ? 'Yes' : 'No',
    quote_source:    'Online Widget'
  };
  fetch(GHL_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(() => {});
  showStep(4);
}

document.getElementById('address-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadMap();
});
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY&libraries=drawing,geometry,places&callback=initAutocomplete" async defer></script>
<script>
function initAutocomplete() {
  const input = document.getElementById('address-input');
  const autocomplete = new google.maps.places.Autocomplete(input, {
    componentRestrictions: { country: 'us' },
    fields: ['formatted_address'],
    types: ['address'],
  });
  autocomplete.addListener('place_changed', function() {
    const place = autocomplete.getPlace();
    if (place.formatted_address) input.value = place.formatted_address;
  });
}
</script>
